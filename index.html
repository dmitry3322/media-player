<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>BOT FRIEND PLAYER</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#05070f;
color:white;
padding-bottom:230px;
}

.header{
padding:24px 18px 14px;
display:flex;
align-items:center;
justify-content:space-between;
}

.logo{
display:flex;
align-items:center;
gap:12px;
font-size:24px;
font-weight:700;
}

.online{
width:14px;
height:14px;
background:#35d07f;
border-radius:50%;
box-shadow:0 0 12px #35d07f;
}

.top-buttons{
display:flex;
gap:12px;
}

.top-btn{
width:58px;
height:58px;
border:none;
border-radius:18px;
background:#121628;
color:white;
font-size:28px;
}

.search{
padding:0 18px 18px;
}

.search input{
width:100%;
height:62px;
border:none;
outline:none;
border-radius:24px;
background:#101425;
color:white;
padding:0 20px;
font-size:22px;
}

.tabs{
display:flex;
gap:14px;
overflow:auto;
padding:0 18px 20px;
}

.tab{
border:none;
padding:16px 24px;
border-radius:24px;
background:#111527;
color:white;
font-size:18px;
white-space:nowrap;
}

.tab.active{
background:#8b5cf6;
}

.content{
padding:0 18px;
}

.track-card{
display:flex;
align-items:center;
gap:12px;
background:#141828;
border-radius:24px;
padding:12px;
margin-bottom:14px;
border:1px solid rgba(255,255,255,.06);
min-height:92px;
}

.checkbox{
width:28px;
height:28px;
}

.track-cover{
width:74px;
height:74px;
border-radius:20px;
flex-shrink:0;
object-fit:cover;
background:#8b5cf6;
display:flex;
align-items:center;
justify-content:center;
font-size:34px;
}

.track-info{
flex:1;
min-width:0;
}

.track-title{
font-size:16px;
font-weight:700;
white-space:nowrap;
overflow:hidden;
text-overflow:ellipsis;
}

.track-artist{
font-size:13px;
opacity:.7;
margin-top:4px;
white-space:nowrap;
overflow:hidden;
text-overflow:ellipsis;
}

.track-actions{
display:flex;
align-items:center;
gap:10px;
}

.icon-btn{
width:52px;
height:52px;
border:none;
border-radius:18px;
background:#232738;
color:white;
font-size:24px;
}

.play-btn{
background:#8b5cf6;
}

.send-selected{
position:fixed;
left:14px;
right:14px;
bottom:210px;
height:58px;
border:none;
border-radius:22px;
background:#3ddc84;
color:white;
font-size:22px;
font-weight:700;
z-index:998;
}

.player-panel{
position:fixed;
left:0;
right:0;
bottom:0;
background:#090b16;
border-top-left-radius:26px;
border-top-right-radius:26px;
padding:14px 18px 24px;
z-index:999;
}

.player-top{
display:flex;
align-items:center;
gap:16px;
}

.player-cover{
width:92px;
height:92px;
border-radius:24px;
background:#8b5cf6;
display:flex;
align-items:center;
justify-content:center;
font-size:48px;
flex-shrink:0;
}

.player-info{
flex:1;
min-width:0;
}

.player-title{
font-size:18px;
font-weight:700;
white-space:nowrap;
overflow:hidden;
text-overflow:ellipsis;
}

.player-artist{
font-size:14px;
opacity:.7;
margin-top:6px;
}

.progress{
width:100%;
height:8px;
background:#1e2233;
border-radius:20px;
margin:18px 0;
overflow:hidden;
}

.progress-bar{
width:20%;
height:100%;
background:#8b5cf6;
}

.controls{
display:flex;
justify-content:center;
align-items:center;
gap:28px;
}

.control-btn{
width:72px;
height:72px;
border:none;
border-radius:24px;
background:#161a2c;
color:white;
font-size:30px;
}

.control-play{
width:92px;
height:92px;
background:#8b5cf6;
font-size:38px;
}
</style>
</head>

<body>

<div class="header">
<div class="logo">
<div class="online"></div>
BOT FRIEND
</div>

<div class="top-buttons">
<button class="top-btn">🌙</button>
<button class="top-btn">↻</button>
</div>
</div>

<div class="search">
<input type="text" placeholder="🔎 Поиск...">
</div>

<div class="tabs">
<button class="tab active">Все</button>
<button class="tab">🎧 Аудио</button>
<button class="tab">🎬 Клипы</button>
<button class="tab">❤️ Избранное</button>
<button class="tab">▶ Youtube</button>
</div>

<div class="content">

<div class="track-card">
<input class="checkbox" type="checkbox" checked>

<div class="track-cover">
🎬
</div>

<div class="track-info">
<div class="track-title">
Сборник клипов
</div>

<div class="track-artist">
Кино
</div>
</div>

<div class="track-actions">
<button class="icon-btn">🤍</button>
<button class="icon-btn play-btn">▶</button>
</div>
</div>

<div class="track-card">
<input class="checkbox" type="checkbox">

<div class="track-cover">
🎬
</div>

<div class="track-info">
<div class="track-title">
Пачка Сигарет
</div>

<div class="track-artist">
Виктор Цой | Кино
</div>
</div>

<div class="track-actions">
<button class="icon-btn">🤍</button>
<button class="icon-btn play-btn">▶</button>
</div>
</div>

<div class="track-card">
<input class="checkbox" type="checkbox">

<div class="track-cover">
🎬
</div>

<div class="track-info">
<div class="track-title">
ЛУЧШИЕ КЛИПЫ
</div>

<div class="track-artist">
ЛИНДА
</div>
</div>

<div class="track-actions">
<button class="icon-btn">🤍</button>
<button class="icon-btn play-btn">▶</button>
</div>
</div>

</div>

<button class="send-selected">
▶ Отправить выбранное
</button>

<div class="player-panel">

<div class="player-top">

<div class="player-cover">
🎧
</div>

<div class="player-info">
<div class="player-title">
Ничего не выбрано
</div>

<div class="player-artist">
BOT FRIEND PLAYER
</div>
</div>

</div>

<div class="progress">
<div class="progress-bar"></div>
</div>

<div class="controls">
<button class="control-btn">⏮</button>
<button class="control-btn control-play">▶</button>
<button class="control-btn">⏭</button>
</div>

</div>

</body>
</html>
