<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Пульт управления Bot-Friend</title>
    <style>
        /* Переменные тем оформления */
        :root {
            --bg-color: #121214;
            --panel-bg: #1a1a1e;
            --accent-color: #7c6ff7;
            --text-main: #ffffff;
            --text-muted: #aaaaaa;
            --border-color: #2c2c35;
            --card-border: #7c6ff7;
            --batch-bg: #1f1f24;
        }

        body.light-theme {
            --bg-color: #f4f4f7;
            --panel-bg: #ffffff;
            --text-main: #1c1c1f;
            --text-muted: #6e6e77;
            --border-color: #e4e4e7;
            --batch-bg: #e4e4e7;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 12px;
            box-sizing: border-box;
            padding-bottom: 80px; /* Отступ под нижнюю панель */
        }

        .container {
            max-width: 480px;
            margin: 0 auto;
        }

        /* Шапка со статусом и управлением */
        .status-card {
            background: var(--panel-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 14px;
            margin-bottom: 12px;
            position: relative;
        }

        .status-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }

        .status-row:last-child {
            margin-bottom: 0;
        }

        .left-controls {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        /* Точка-индикатор пинга */
        .ping-indicator {
            width: 8px;
            height: 8px;
            background-color: #ff3b30;
            border-radius: 50%;
            display: inline-block;
            transition: background-color 0.3s;
        }
        .ping-indicator.online {
            background-color: #4cd964;
        }

        /* Правый верхний угол: блок кнопок */
        .header-actions {
            position: absolute;
            top: 14px;
            right: 14px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .action-icon-btn {
            background: none;
            border: none;
            color: var(--text-main);
            cursor: pointer;
            padding: 4px;
            font-size: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 28px;
            height: 28px;
            border-radius: 6px;
            border: 1px solid var(--border-color);
        }
        
        .action-icon-btn:active {
            background: var(--border-color);
        }

        /* Консоль настроек */
        .control-panel {
            background: var(--panel-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 12px;
        }

        h3 {
            margin-top: 0;
            margin-bottom: 14px;
            font-size: 16px;
            color: var(--accent-color);
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 6px;
        }

        .form-group {
            margin-bottom: 14px;
        }

        label {
            display: block;
            font-size: 13px;
            color: var(--text-muted);
            margin-bottom: 6px;
        }

        select, textarea, input[type="range"] {
            width: 100%;
            background: #222227;
            border: 1px solid var(--border-color);
            color: var(--text-main);
            border-radius: 8px;
            padding: 10px;
            box-sizing: border-box;
            font-size: 14px;
        }
        body.light-theme select, body.light-theme textarea {
            background: #f4f4f7;
        }

        input[type="range"] {
            padding: 0;
            height: 6px;
            background: #2c2c35;
        }

        .range-val {
            float: right;
            font-size: 12px;
            color: var(--accent-color);
        }

        .btn {
            width: 100%;
            background: var(--accent-color);
            color: white;
            border: none;
            border-radius: 8px;
            padding: 12px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
        }

        /* Список треков с окантовкой 15px */
        .track-list-container {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .track-card {
            background: var(--panel-bg);
            border: 1px solid var(--card-border);
            border-radius: 15px;
            padding: 12px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
        }

        .track-left {
            display: flex;
            align-items: center;
            gap: 12px;
            flex-grow: 1;
        }

        /* Чекбоксы мульти-выбора */
        .track-checkbox {
            width: 18px;
            height: 18px;
            accent-color: var(--accent-color);
            cursor: pointer;
        }

        .track-info {
            font-size: 13px;
        }

        .track-meta {
            font-size: 11px;
            color: var(--text-muted);
            margin-top: 2px;
        }

        .track-rights {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        /* Компонент Сердечко */
        .heart-icon {
            font-size: 18px;
            cursor: pointer;
            color: var(--text-muted);
            user-select: none;
            transition: color 0.2s, transform 0.1s;
        }
        .heart-icon.active {
            color: #ff3b30;
        }
        .heart-icon:active {
            transform: scale(1.2);
        }

        .track-action {
            background: none;
            border: 1px solid var(--accent-color);
            color: var(--accent-color);
            border-radius: 6px;
            padding: 6px 10px;
            font-size: 12px;
            cursor: pointer;
            font-weight: bold;
        }

        /* Фиксированная нижняя панель пакетных действий */
        .batch-panel {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: var(--batch-bg);
            border-top: 1px solid var(--border-color);
            padding: 14px;
            display: none;
            justify-content: center;
            box-shadow: 0 -4px 10px rgba(0,0,0,0.2);
            z-index: 1000;
        }

        .batch-btn {
            width: 100%;
            max-width: 452px;
            background: #4cd964;
            color: #ffffff;
            border: none;
            border-radius: 8px;
            padding: 12px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
        }
        .batch-btn:active {
            opacity: 0.9;
        }
    </style>
</head>
<body>

<div class="container">

    <div class="status-card">
        <div class="left-controls">
            <span class="ping-indicator" id="ping-dot"></span>
            <span style="font-size: 14px; font-weight: 500;">Бот-Спутник</span>
        </div>
        
        <div class="header-actions">
            <button class="action-icon-btn" id="refresh-btn" title="Обновить список" onclick="refreshTracks()">↻</button>
            <button class="action-icon-btn" id="theme-toggle" title="Сменить тему" onclick="toggleTheme()">🌙</button>
        </div>

        <div class="status-row" style="font-size: 12px; color: var(--text-muted); margin-top: 10px;">
            <span>Среда: Pydroid 3 (Локально)</span>
            <span>БД: music.db</span>
        </div>
    </div>

    <div class="control-panel">
        <h3>Параметры генерации</h3>
        
        <div class="form-group">
            <label>Голос спикера (Edge-TTS)</label>
            <select id="voice">
                <option value="ru-RU-DmitryNeural">Дмитрий (Мужской)</option>
                <option value="ru-RU-SvetlanaNeural">Светлана (Женский)</option>
            </select>
        </div>

        <div class="form-group">
            <label>Скорость чтения <span class="range-val" id="speed-val">0%</span></label>
            <input type="range" id="speed" min="-50" max="50" value="0" oninput="document.getElementById('speed-val').innerText = this.value + '%'">
        </div>

        <div class="form-group">
            <label>Инструкция для Gemini (Промпт)</label>
            <textarea id="prompt" rows="3" placeholder="Задай контекст для генерации текста песни..."></textarea>
        </div>

        <button class="btn" onclick="startGeneration()">Запустить генерацию</button>
    </div>

    <h3 style="font-size: 15px; padding-left: 4px; margin-bottom: 10px;">Файлы в локальной базе</h3>
    <div class="track-list-container">
        
        <div class="track-card" data-id="101">
            <div class="track-left">
                <input type="checkbox" class="track-checkbox" onchange="handleCheckboxChange()">
                <div class="track-info">
                    <div>Track_01_Gemini.mp3</div>
                    <div class="track-meta">Синтез: Дмитрий | 2.4 МБ</div>
                </div>
            </div>
            <div class="track-rights">
                <span class="heart-icon" onclick="toggleFavorite(this)">♥</span>
                <button class="track-action" onclick="sendSingleTrack(101)">В чат</button>
            </div>
        </div>

        <div class="track-card" data-id="102">
            <div class="track-left">
                <input type="checkbox" class="track-checkbox" onchange="handleCheckboxChange()">
                <div class="track-info">
                    <div>Track_02_Gemini.mp3</div>
                    <div class="track-meta">Синтез: Светлана | 1.8 МБ</div>
                </div>
            </div>
            <div class="track-rights">
                <span class="heart-icon" onclick="toggleFavorite(this)">♥</span>
                <button class="track-action" onclick="sendSingleTrack(102)">В чат</button>
            </div>
        </div>

    </div>
</div>

<div class="batch-panel" id="batch-toolbar">
    <button class="batch-btn" id="batch-action-btn" onclick="sendSelectedBatch()">Прослушать выбранное (0)</button>
</div>

<script>
    // Логика инициализации WebApp Telegram
    let tg = window.Telegram ? window.Telegram.WebApp : null;
    if (tg) {
        tg.ready();
        tg.expand();
    }

    // Симуляция пинга ядра Python (изменение статуса точки)
    setTimeout(() => {
        document.getElementById('ping-dot').classList.add('online');
    }, 800);

    // Переключение цветовой схемы
    function toggleTheme() {
        const body = document.body;
        const btn = document.getElementById('theme-toggle');
        body.classList.toggle('light-theme');
        if (body.classList.contains('light-theme')) {
            btn.innerText = '☀️';
        } else {
            btn.innerText = '🌙';
        }
    }

    // Логика кнопки «Сердечко»
    function toggleFavorite(element) {
        element.classList.toggle('active');
    }

    // Компактная функция обновления списка в верхнем углу
    function refreshTracks() {
        const btn = document.getElementById('refresh-btn');
        btn.style.transform = 'rotate(360deg)';
        btn.style.transition = 'transform 0.4s';
        setTimeout(() => { btn.style.transform = 'rotate(0deg)'; }, 400);
        console.log("Запрос на обновление списка треков отправлен в БД.");
    }

    // Логика мульти-выбора и подсчета чекбоксов
    function handleCheckboxChange() {
        const checkboxes = document.querySelectorAll('.track-checkbox');
        const batchPanel = document.getElementById('batch-toolbar');
        const batchBtn = document.getElementById('batch-action-btn');
        
        let selectedIds = [];
        checkboxes.forEach((cb) => {
            if (cb.checked) {
                const card = cb.closest('.track-card');
                selectedIds.push(card.getAttribute('data-id'));
            }
        });

        if (selectedIds.length > 0) {
            batchPanel.style.display = 'flex';
            batchBtn.innerText = `Прослушать выбранное (${selectedIds.length})`;
        } else {
            batchPanel.style.display = 'none';
        }
    }

    // Отправка одного трека
    function sendSingleTrack(trackId) {
        const data = JSON.stringify({ action: "play_single", id: trackId });
        if (tg) {
            tg.sendData(data);
        } else {
            alert(`Режим тестирования: Отправлен ID трека ${trackId}`);
        }
    }

    // Пакетная отправка выбранных треков
    function sendSelectedBatch() {
        const checkboxes = document.querySelectorAll('.track-checkbox');
        let selectedIds = [];
        
        checkboxes.forEach((cb) => {
            if (cb.checked) {
                const card = cb.closest('.track-card');
                selectedIds.push(parseInt(card.getAttribute('data-id')));
            }
        });

        const data = JSON.stringify({ action: "play_batch", ids: selectedIds });
        if (tg) {
            tg.sendData(data);
            tg.close();
        } else {
            alert(`Режим тестирования: Отправлен пакет ID [${selectedIds.join(', ')}]`);
        }
    }

    function startGeneration() {
        const voice = document.getElementById('voice').value;
        const speed = document.getElementById('speed').value;
        const prompt = document.getElementById('prompt').value;
        console.log(`Запуск генерации: голос=${voice}, скорость=${speed}, промпт=${prompt}`);
    }
</script>
</body>
</html>
