<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BOT FRIEND PLAYER</title>

    <script src="https://telegram.org/js/telegram-web-app.js"></script>

    <style>
        :root {
            --bg: #07070c;
            --card: #13131d;
            --card2: #1a1a28;
            --text: #ffffff;
            --sub: #a1a1b5;
            --accent: #8b5cf6;
            --accent2: #6d28d9;
            --border: rgba(255,255,255,0.06);
            --green: #35d07f;
        }

        body.light-theme {
            --bg: #f4f4f8;
            --card: #ffffff;
            --card2: #ececf3;
            --text: #111111;
            --sub: #666;
            --border: rgba(0,0,0,0.08);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            overflow: hidden;
            height: 100vh;
        }

        .app {
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .header {
            padding: 18px;
            border-bottom: 1px solid var(--border);
            background: rgba(10,10,15,0.95);
            backdrop-filter: blur(14px);
        }

        body.light-theme .header {
            background: rgba(255,255,255,0.95);
        }

        .topbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 18px;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 21px;
            font-weight: 700;
        }

        .online-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: #35d07f;
            box-shadow: 0 0 12px #35d07f;
        }

        .actions {
            display: flex;
            gap: 10px;
        }

        .icon-btn {
            width: 42px;
            height: 42px;
            border-radius: 14px;
            border: none;
            background: var(--card);
            color: var(--text);
            font-size: 18px;
        }

        .search {
            width: 100%;
            padding: 15px 18px;
            border-radius: 18px;
            border: none;
            background: var(--card);
            color: var(--text);
            font-size: 16px;
            outline: none;
        }

        .tabs {
            display: flex;
            gap: 10px;
            padding: 14px 16px;
            overflow-x: auto;
        }

        .tab {
            border: none;
            border-radius: 18px;
            padding: 14px 22px;
            background: var(--card);
            color: var(--sub);
            font-size: 15px;
            font-weight: 600;
            white-space: nowrap;
        }

        .tab.active {
            background: linear-gradient(135deg,var(--accent),var(--accent2));
            color: white;
        }

        .track-list {
            flex: 1;
            overflow-y: auto;
            padding: 10px 16px 340px;
        }

        .track {
            display: flex;
            align-items: center;
            gap: 14px;
            background: linear-gradient(135deg,var(--card),var(--card2));
            border: 1px solid var(--border);
            border-radius: 28px;
            padding: 16px;
            margin-bottom: 14px;
        }

        .track-check {
            width: 20px;
            height: 20px;
            accent-color: var(--accent);
        }

        .cover {
            width: 74px;
            height: 74px;
            border-radius: 24px;
            background: linear-gradient(135deg,var(--accent),#a78bfa);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 34px;
            flex-shrink: 0;
        }

        .track-info {
            flex: 1;
            min-width: 0;
        }

        .title {
            font-size: 17px;
            font-weight: 700;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            margin-bottom: 5px;
        }

        .artist {
            color: var(--sub);
            font-size: 15px;
        }

        .controls {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .heart {
            width: 52px;
            height: 52px;
            border-radius: 18px;
            border: none;
            background: rgba(255,255,255,0.05);
            color: white;
            font-size: 22px;
        }

        .heart.active {
            color: #ff4d6d;
        }

        .play {
            width: 60px;
            height: 60px;
            border-radius: 22px;
            border: none;
            background: linear-gradient(135deg,var(--accent),var(--accent2));
            color: white;
            font-size: 24px;
        }

        .batch-panel {
            position: fixed;
            left: 0;
            right: 0;
            bottom: 190px;
            background: rgba(20,20,25,0.96);
            backdrop-filter: blur(12px);
            border-top: 1px solid rgba(255,255,255,0.06);
            padding: 14px 16px;
            display: none;
            justify-content: center;
            z-index: 999;
            box-shadow: 0 -4px 25px rgba(0,0,0,0.45);
        }

        .batch-btn {
            width: 100%;
            border: none;
            border-radius: 20px;
            padding: 18px;
            background: var(--green);
            color: white;
            font-size: 17px;
            font-weight: 700;
        }

        .player-container {
            position: fixed;
            left: 0;
            right: 0;
            bottom: 0;
            z-index: 1000;
            background: rgba(15,15,20,0.98);
            backdrop-filter: blur(16px);
            border-top: 1px solid rgba(255,255,255,0.06);
            padding: 18px;
            border-radius: 24px 24px 0 0;
        }

        .player-top {
            display: flex;
            gap: 14px;
            align-items: center;
        }

        .player-cover {
            width: 84px;
            height: 84px;
            border-radius: 24px;
            background: linear-gradient(135deg,var(--accent),#a78bfa);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 42px;
            flex-shrink: 0;
        }

        .player-info {
            flex: 1;
            min-width: 0;
        }

        .player-title {
            font-size: 17px;
            font-weight: 700;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .player-artist {
            color: var(--sub);
            margin-top: 6px;
            font-size: 15px;
        }

        .progress {
            width: 100%;
            height: 6px;
            border-radius: 10px;
            background: rgba(255,255,255,0.08);
            overflow: hidden;
            margin: 18px 0;
        }

        .progress-bar {
            width: 10%;
            height: 100%;
            background: linear-gradient(90deg,var(--accent),#a78bfa);
        }

        .player-controls {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 26px;
        }

        .player-btn {
            border: none;
            background: rgba(255,255,255,0.05);
            color: white;
            width: 62px;
            height: 62px;
            border-radius: 20px;
            font-size: 26px;
        }

        .player-btn.main {
            width: 82px;
            height: 82px;
            background: linear-gradient(135deg,var(--accent),var(--accent2));
            font-size: 32px;
        }

        .empty {
            text-align: center;
            padding: 60px;
            color: var(--sub);
        }
    </style>
</head>

<body>

<div class="app">

    <div class="header">

        <div class="topbar">
            <div class="logo">
                <div class="online-dot"></div>
                BOT FRIEND
            </div>

            <div class="actions">
                <button class="icon-btn" onclick="toggleTheme()">🌙</button>
                <button class="icon-btn" onclick="location.reload()">↻</button>
            </div>
        </div>

        <input
            type="text"
            class="search"
            placeholder="🔎 Поиск..."
            oninput="filterTracks()"
        >
    </div>

    <div class="tabs">
        <button class="tab active" onclick="switchTab('all')">Все</button>
        <button class="tab" onclick="switchTab('audio')">🎧 Аудио</button>
        <button class="tab" onclick="switchTab('video')">🎬 Клипы</button>
        <button class="tab" onclick="switchTab('fav')">❤️ Избранное</button>
    </div>

    <div class="track-list" id="trackList">
        <div class="empty">Загрузка...</div>
    </div>

</div>

<div class="batch-panel" id="batchPanel">
    <button class="batch-btn" onclick="sendSelectedBatch()" id="batchBtn">
        ▶ Отправить выбранное
    </button>
</div>

<div class="player-container">

    <div class="player-top">
        <div class="player-cover">🎧</div>

        <div class="player-info">
            <div class="player-title" id="playerTitle">
                Ничего не выбрано
            </div>

            <div class="player-artist">
                BOT FRIEND PLAYER
            </div>
        </div>
    </div>

    <div class="progress">
        <div class="progress-bar"></div>
    </div>

    <div class="player-controls">
        <button class="player-btn">⏮</button>
        <button class="player-btn main">▶</button>
        <button class="player-btn">⏭</button>
    </div>

</div>

<script>

const tg = window.Telegram.WebApp;
tg.expand();

let allTracks = [];
let currentTab = 'all';

let favoriteIds =
    JSON.parse(localStorage.getItem('fav_tracks')) || [];

fetch('https://dmitry3322.github.io/media-player/music_list.json')
.then(r => r.json())
.then(data => {
    allTracks = data || [];
    renderTracks();
})
.catch(() => {
    document.getElementById('trackList').innerHTML =
        '<div class="empty">Ошибка загрузки music_list.json</div>';
});

function toggleTheme() {
    document.body.classList.toggle('light-theme');
}

function switchTab(tab) {

    currentTab = tab;

    document.querySelectorAll('.tab')
    .forEach(t => t.classList.remove('active'));

    event.target.classList.add('active');

    renderTracks();
}

function filterTracks() {

    const q =
        document.querySelector('.search')
        .value
        .toLowerCase();

    renderTracks(q);
}

function renderTracks(query = '') {

    let filtered = allTracks;

    if(currentTab === 'audio')
        filtered = filtered.filter(t => t.file_type === 'audio');

    if(currentTab === 'video')
        filtered = filtered.filter(t => t.file_type === 'video');

    if(currentTab === 'fav')
        filtered = filtered.filter(t => favoriteIds.includes(t.id));

    if(query) {
        filtered = filtered.filter(t =>
            (t.artist + ' ' + t.title)
            .toLowerCase()
            .includes(query)
        );
    }

    const container =
        document.getElementById('trackList');

    container.innerHTML = '';

    if(!filtered.length) {
        container.innerHTML =
            '<div class="empty">Ничего не найдено</div>';
        return;
    }

    filtered.forEach(track => {

        const liked =
            favoriteIds.includes(track.id)
            ? 'active'
            : '';

        const div = document.createElement('div');

        div.className = 'track';

        div.setAttribute('data-id', track.id);

        div.innerHTML = `
            <input
                type="checkbox"
                class="track-check"
                onchange="handleCheckboxes()"
            >

            <div class="cover">
                ${track.file_type === 'audio' ? '🎧' : '🎬'}
            </div>

            <div class="track-info">
                <div class="title">
                    ${track.title || 'Без названия'}
                </div>

                <div class="artist">
                    ${track.artist || 'Неизвестен'}
                </div>
            </div>

            <div class="controls">

                <button
                    class="heart ${liked}"
                    onclick="toggleFav(this, ${track.id})"
                >
                    ♥
                </button>

                <button
                    class="play"
                    onclick="sendToBot(${track.id}, '${track.title}')"
                >
                    ▶
                </button>

            </div>
        `;

        container.appendChild(div);
    });
}

function toggleFav(el, id) {

    el.classList.toggle('active');

    if(el.classList.contains('active')) {

        if(!favoriteIds.includes(id))
            favoriteIds.push(id);

    } else {

        favoriteIds =
            favoriteIds.filter(x => x !== id);
    }

    localStorage.setItem(
        'fav_tracks',
        JSON.stringify(favoriteIds)
    );

    if(currentTab === 'fav')
        renderTracks();
}

function handleCheckboxes() {

    const checks =
        document.querySelectorAll('.track-check');

    let count = 0;

    checks.forEach(c => {
        if(c.checked) count++;
    });

    const panel =
        document.getElementById('batchPanel');

    const btn =
        document.getElementById('batchBtn');

    if(count > 0) {

        panel.style.display = 'flex';

        btn.innerText =
            `▶ Отправить выбранное (${count})`;

    } else {

        panel.style.display = 'none';
    }
}

function sendToBot(id, title) {

    document.getElementById('playerTitle').innerText =
        title;

    tg.sendData(JSON.stringify({
        action: 'play',
        id: id
    }));
}

function sendSelectedBatch() {

    const checks =
        document.querySelectorAll('.track-check');

    let ids = [];

    checks.forEach(c => {

        if(c.checked) {

            const item = c.closest('.track');

            ids.push(
                parseInt(item.getAttribute('data-id'))
            );
        }
    });

    if(ids.length) {

        tg.sendData(JSON.stringify({
            action: 'play_batch',
            ids: ids
        }));
    }
}

</script>

</body>
</html>
