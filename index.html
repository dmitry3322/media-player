```html
<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>BOT FRIEND PLAYER</title>

<script src="https://telegram.org/js/telegram-web-app.js"></script>

<style>

:root{
    --bg:#0f1117;
    --card:#1a1d27;
    --card2:#222634;
    --text:#ffffff;
    --sub:#9aa4b2;
    --accent:#7c5cff;
    --accent2:#5f43d8;
    --border:#2f3545;
    --green:#39d98a;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:var(--bg);
    color:var(--text);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
    overflow:hidden;
    height:100vh;
}

.app{
    display:flex;
    flex-direction:column;
    height:100vh;
}

.header{
    padding:18px;
    border-bottom:1px solid var(--border);
    background:rgba(15,17,23,.95);
    backdrop-filter:blur(10px);
}

.top{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:14px;
}

.logo{
    display:flex;
    align-items:center;
    gap:10px;
}

.logo h1{
    font-size:20px;
}

.status{
    width:10px;
    height:10px;
    border-radius:50%;
    background:#39d98a;
    box-shadow:0 0 10px #39d98a;
}

.reload{
    width:38px;
    height:38px;
    border:none;
    border-radius:12px;
    background:var(--card);
    color:white;
    font-size:18px;
}

.search{
    width:100%;
    height:46px;
    border:none;
    outline:none;
    border-radius:14px;
    padding:0 16px;
    background:var(--card);
    color:white;
    font-size:15px;
}

.tabs{
    display:flex;
    gap:8px;
    padding:14px;
    overflow-x:auto;
}

.tab{
    border:none;
    background:var(--card);
    color:var(--sub);
    padding:11px 16px;
    border-radius:14px;
    white-space:nowrap;
    font-size:14px;
    font-weight:600;
}

.tab.active{
    background:var(--accent);
    color:white;
}

.list{
    flex:1;
    overflow-y:auto;
    padding:0 14px 160px;
}

.track{
    background:linear-gradient(145deg,var(--card),var(--card2));
    border:1px solid var(--border);
    border-radius:22px;
    padding:14px;
    display:flex;
    align-items:center;
    gap:14px;
    margin-bottom:12px;
    transition:.2s;
}

.track:active{
    transform:scale(.98);
}

.cover{
    width:62px;
    height:62px;
    border-radius:18px;
    background:linear-gradient(145deg,var(--accent),#9b8cff);
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:28px;
    flex-shrink:0;
}

.info{
    flex:1;
    min-width:0;
}

.title{
    font-size:15px;
    font-weight:700;
    overflow:hidden;
    text-overflow:ellipsis;
    white-space:nowrap;
}

.artist{
    color:var(--sub);
    margin-top:6px;
    font-size:13px;
    overflow:hidden;
    text-overflow:ellipsis;
    white-space:nowrap;
}

.actions{
    display:flex;
    align-items:center;
    gap:12px;
}

.icon-btn{
    width:42px;
    height:42px;
    border:none;
    border-radius:14px;
    background:rgba(255,255,255,.06);
    color:white;
    font-size:18px;
}

.play{
    background:var(--accent);
}

.like.active{
    color:#ff4d6d;
}

.player{
    position:fixed;
    left:0;
    right:0;
    bottom:0;
    background:rgba(20,22,31,.97);
    backdrop-filter:blur(18px);
    border-top:1px solid var(--border);
    padding:14px;
}

.player-top{
    display:flex;
    align-items:center;
    gap:14px;
}

.player-cover{
    width:68px;
    height:68px;
    border-radius:18px;
    background:linear-gradient(145deg,var(--accent),#9b8cff);
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:30px;
}

.player-info{
    flex:1;
    min-width:0;
}

.player-title{
    font-size:15px;
    font-weight:700;
    overflow:hidden;
    text-overflow:ellipsis;
    white-space:nowrap;
}

.player-artist{
    color:var(--sub);
    margin-top:6px;
    font-size:13px;
}

.progress{
    width:100%;
    height:5px;
    background:#2a2f3d;
    border-radius:999px;
    margin:14px 0;
    overflow:hidden;
}

.progress-bar{
    width:35%;
    height:100%;
    background:linear-gradient(90deg,var(--accent),#9b8cff);
    border-radius:999px;
    animation:progressAnim 12s linear infinite;
}

@keyframes progressAnim{
    from{width:0%;}
    to{width:100%;}
}

.controls{
    display:flex;
    justify-content:center;
    align-items:center;
    gap:22px;
}

.ctrl{
    width:52px;
    height:52px;
    border:none;
    border-radius:18px;
    background:var(--card);
    color:white;
    font-size:20px;
}

.ctrl.main{
    width:64px;
    height:64px;
    background:var(--accent);
    font-size:24px;
}

.batch{
    position:fixed;
    bottom:170px;
    left:14px;
    right:14px;
    display:none;
}

.batch button{
    width:100%;
    height:54px;
    border:none;
    border-radius:18px;
    background:var(--green);
    color:white;
    font-size:15px;
    font-weight:700;
}

.empty{
    text-align:center;
    color:var(--sub);
    padding-top:80px;
}

</style>
</head>

<body>

<div class="app">

<div class="header">

<div class="top">

<div class="logo">
<div class="status"></div>
<h1>BOT FRIEND</h1>
</div>

<button class="reload" onclick="location.reload()">↻</button>

</div>

<input class="search" placeholder="🔍 Поиск..." oninput="searchTracks()">

</div>

<div class="tabs">

<button class="tab active" onclick="switchTab('all',this)">Все</button>
<button class="tab" onclick="switchTab('audio',this)">🎧 Аудио</button>
<button class="tab" onclick="switchTab('video',this)">🎬 Клипы</button>
<button class="tab" onclick="switchTab('fav',this)">❤️ Избранное</button>

</div>

<div class="list" id="list">
<div class="empty">Загрузка...</div>
</div>

<div class="batch" id="batch">
<button onclick="sendSelected()">▶ Отправить выбранное</button>
</div>

<div class="player">

<div class="player-top">

<div class="player-cover" id="playerEmoji">🎧</div>

<div class="player-info">
<div class="player-title" id="playerTitle">Ничего не выбрано</div>
<div class="player-artist" id="playerArtist">BOT FRIEND PLAYER</div>
</div>

</div>

<div class="progress">
<div class="progress-bar"></div>
</div>

<div class="controls">

<button class="ctrl">⏮</button>
<button class="ctrl main">▶</button>
<button class="ctrl">⏭</button>

</div>

</div>

</div>

<script>

const tg = window.Telegram.WebApp;
tg.expand();

let tracks = [];
let currentTab = "all";
let selected = [];

const favs = JSON.parse(localStorage.getItem("favs") || "[]");

fetch("https://dmitry3322.github.io/media-player/music_list.json")
.then(r=>r.json())
.then(data=>{
    tracks=data||[];
    render();
})
.catch(()=>{
    document.getElementById("list").innerHTML='<div class="empty">music_list.json не найден</div>';
});

function switchTab(tab,el){

    currentTab=tab;

    document.querySelectorAll(".tab").forEach(x=>{
        x.classList.remove("active");
    });

    el.classList.add("active");

    render();
}

function searchTracks(){
    render(document.querySelector(".search").value.toLowerCase());
}

function render(search=""){

    let arr=[...tracks];

    if(currentTab==="audio"){
        arr=arr.filter(x=>x.file_type==="audio");
    }

    if(currentTab==="video"){
        arr=arr.filter(x=>x.file_type==="video");
    }

    if(currentTab==="fav"){
        arr=arr.filter(x=>favs.includes(x.id));
    }

    if(search){
        arr=arr.filter(x=>
            (x.artist+" "+x.title).toLowerCase().includes(search)
        );
    }

    const list=document.getElementById("list");

    if(!arr.length){
        list.innerHTML='<div class="empty">Ничего не найдено</div>';
        return;
    }

    list.innerHTML="";

    arr.forEach(t=>{

        const liked=favs.includes(t.id);

        const div=document.createElement("div");

        div.className="track";

        div.innerHTML=`

        <input type="checkbox" onchange="toggleSelect(${t.id},this)">

        <div class="cover">
            ${t.file_type==="audio"?"🎧":"🎬"}
        </div>

        <div class="info">

            <div class="title">
                ${t.title||"Без названия"}
            </div>

            <div class="artist">
                ${t.artist||"Неизвестен"}
            </div>

        </div>

        <div class="actions">

            <button class="icon-btn like ${liked?"active":""}"
            onclick="toggleFav(${t.id},this)">
            ♥
            </button>

            <button class="icon-btn play"
            onclick="playTrack(${t.id},
            '${escapeQuotes(t.title)}',
            '${escapeQuotes(t.artist)}',
            '${t.file_type}')">
            ▶
            </button>

        </div>
        `;

        list.appendChild(div);

    });

}

function toggleFav(id,btn){

    let arr=JSON.parse(localStorage.getItem("favs")||"[]");

    if(arr.includes(id)){
        arr=arr.filter(x=>x!==id);
        btn.classList.remove("active");
    }else{
        arr.push(id);
        btn.classList.add("active");
    }

    localStorage.setItem("favs",JSON.stringify(arr));

    if(currentTab==="fav"){
        render();
    }
}

function toggleSelect(id,el){

    if(el.checked){
        if(!selected.includes(id)){
            selected.push(id);
        }
    }else{
        selected=selected.filter(x=>x!==id);
    }

    document.getElementById("batch").style.display=
    selected.length?"block":"none";
}

function sendSelected(){

    if(!selected.length)return;

    tg.sendData(JSON.stringify({
        action:"play_batch",
        ids:selected
    }));

    tg.close();
}

function playTrack(id,title,artist,type){

    document.getElementById("playerTitle").innerText=title;
    document.getElementById("playerArtist").innerText=artist;
    document.getElementById("playerEmoji").innerText=
    type==="audio"?"🎧":"🎬";

    tg.sendData(JSON.stringify({
        action:"play",
        id:id
    }));

    setTimeout(()=>{
        tg.close();
    },300);
}

function escapeQuotes(str){
    return (str||"")
    .replace(/'/g,"&#39;")
    .replace(/"/g,"&quot;");
}

</script>

</body>
</html>
```
