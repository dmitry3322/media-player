<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BOT FRIEND Media</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --bg: #1e1e24;
            --card: #282830;
            --text: #e0e0e0;
            --sub: #999;
            --accent: #7c6ff7;
            --active: #6a5de0;
            --border: #444;
            --border-light: #3a3a40;
            --shadow: rgba(0,0,0,0.3);
            --player-bg: #1a1a20;
            --header-bg: #222;
            --tab-bg: #2a2a2a;
            --input-bg: #2a2a2a;
            --heart-default: #555;
            --heart-active: #e74c3c;
        }

        .light-theme {
            --bg: #f5f5f7;
            --card: #ffffff;
            --text: #1a1a1a;
            --sub: #777;
            --accent: #6c5ce7;
            --active: #5a4bd1;
            --border: #ddd;
            --border-light: #e5e5e5;
            --shadow: rgba(0,0,0,0.08);
            --player-bg: #eeeeee;
            --header-bg: #ffffff;
            --tab-bg: #e8e8e8;
            --input-bg: #ffffff;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
            height: 100vh;
            display: flex;
            flex-direction: column;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
            transition: background 0.3s, color 0.3s;
        }

        /* Шапка */
        .header {
            padding: 14px 16px;
            background: var(--header-bg);
            border-bottom: 1px solid var(--border-light);
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
            transition: background 0.3s;
        }
        .header h1 {
            font-size: 18px;
            font-weight: 700;
            letter-spacing: -0.3px;
            white-space: nowrap;
        }
        .theme-btn {
            width: 36px; height: 36px;
            border-radius: 10px;
            border: 1.5px solid var(--border);
            background: var(--card);
            font-size: 18px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
            flex-shrink: 0;
        }
        .theme-btn:active { transform: scale(0.92); }

        /* Поиск */
        .search-wrap { padding: 10px 16px; background: var(--header-bg); transition: background 0.3s; }
        .search-box {
            width: 100%;
            padding: 12px 14px;
            border-radius: 12px;
            border: 1.5px solid var(--border);
            background: var(--input-bg);
            color: var(--text);
            font-size: 15px;
            outline: none;
            transition: all 0.2s;
        }
        .search-box:focus { border-color: var(--accent); }

        /* Вкладки */
        .tabs {
            display: flex;
            gap: 8px;
            padding: 8px 16px 12px;
            background: var(--header-bg);
            border-bottom: 1px solid var(--border-light);
            transition: background 0.3s;
        }
        .tab {
            flex: 1;
            padding: 11px 6px;
            border-radius: 10px;
            border: 1.5px solid var(--border);
            background: var(--tab-bg);
            color: var(--sub);
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            text-align: center;
            transition: all 0.2s;
            letter-spacing: -0.2px;
        }
        .tab.active {
            background: var(--accent);
            color: #fff;
            border-color: var(--accent);
        }
        .tab:active:not(.active) { transform: scale(0.95); }

        /* Список треков */
        .track-list {
            flex: 1;
            overflow-y: auto;
            padding: 10px 16px;
            -webkit-overflow-scrolling: touch;
        }
        .track-item {
            display: flex;
            align-items: center;
            padding: 13px 12px;
            border-radius: 14px;
            background: var(--card);
            margin-bottom: 8px;
            gap: 10px;
            border: 1px solid var(--border-light);
            transition: all 0.2s;
            box-shadow: 0 1px 3px var(--shadow);
        }
        .track-item:active { transform: scale(0.98); }
        .track-icon { font-size: 26px; flex-shrink: 0; }
        .track-info { flex: 1; min-width: 0; }
        .track-title {
            font-size: 14px;
            font-weight: 600;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            letter-spacing: -0.2px;
        }
        .track-artist {
            font-size: 12px;
            color: var(--sub);
            overflow: hidden;
            text-overflow: ellipsis;
            margin-top: 2px;
        }
        .btn {
            width: 38px; height: 38px;
            border-radius: 10px;
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            transition: all 0.2s;
            flex-shrink: 0;
        }
        .btn-play {
            background: var(--accent);
            color: #fff;
        }
        .btn-play:active { background: var(--active); transform: scale(0.9); }
        .btn-heart {
            background: transparent;
            color: var(--heart-default);
            font-size: 20px;
        }
        .btn-heart.liked {
            color: var(--heart-active);
            animation: heartPop 0.35s ease;
        }
        @keyframes heartPop {
            0% { transform: scale(1); }
            35% { transform: scale(1.35); }
            100% { transform: scale(1); }
        }

        .empty { text-align: center; padding: 40px 20px; color: var(--sub); font-size: 14px; }

        /* Мини-плеер */
        .player {
            padding: 12px 16px;
            background: var(--player-bg);
            border-top: 1.5px solid var(--border);
            display: none;
            flex-direction: column;
            gap: 8px;
            transition: background 0.3s;
        }
        .player.show { display: flex; }
        .player-info { display: flex; align-items: center; gap: 10px; }
        .player-title {
            font-size: 13px;
            font-weight: 600;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            flex: 1;
        }
        .player-close {
            background: none;
            border: none;
            color: var(--sub);
            font-size: 18px;
            cursor: pointer;
            padding: 4px;
        }
        .progress-wrap {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 11px;
            color: var(--sub);
        }
        .progress-bar {
            flex: 1;
            height: 4px;
            border-radius: 2px;
            background: var(--border);
            position: relative;
            cursor: pointer;
        }
        .progress-fill {
            height: 100%;
            border-radius: 2px;
            background: var(--accent);
            width: 0%;
            transition: width 0.1s linear;
        }
        .player-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 20px;
        }
        .ctrl-btn {
            background: none;
            border: none;
            color: var(--text);
            font-size: 22px;
            cursor: pointer;
            padding: 6px;
            transition: all 0.15s;
        }
        .ctrl-btn:active { transform: scale(0.85); }
        .ctrl-play {
            width: 44px; height: 44px;
            border-radius: 50%;
            background: var(--accent);
            color: #fff;
            font-size: 18px;
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .ctrl-play:active { transform: scale(0.9); }
    </style>
</head>
<body>

    <!-- Шапка -->
    <div class="header">
        <h1>🎬 BOT FRIEND</h1>
        <button class="theme-btn" onclick="toggleTheme()" title="Сменить тему">🌙</button>
    </div>

    <!-- Поиск -->
    <div class="search-wrap">
        <input type="text" class="search-box" placeholder="🔍 Поиск..." oninput="filterTracks()">
    </div>

    <!-- Вкладки -->
    <div class="tabs">
        <button class="tab active" onclick="switchTab('all')">Все</button>
        <button class="tab" onclick="switchTab('audio')">🎧 Аудио</button>
        <button class="tab" onclick="switchTab('video')">🎬 Клипы</button>
    </div>

    <!-- Список -->
    <div class="track-list" id="trackList"><div class="empty">Загрузка...</div></div>

    <!-- Мини-плеер -->
    <div class="player" id="player">
        <div class="player-info">
            <span>🎵</span>
            <span class="player-title" id="playerTitle">Выберите трек</span>
            <button class="player-close" onclick="closePlayer()">✕</button>
        </div>
        <div class="progress-wrap">
            <span id="curTime">0:00</span>
            <div class="progress-bar" onclick="seekAudio(event)">
                <div class="progress-fill" id="progressFill"></div>
            </div>
            <span id="durTime">0:00</span>
        </div>
        <div class="player-controls">
            <button class="ctrl-btn" onclick="prevTrack()">⏮</button>
            <button class="ctrl-play" id="playBtn" onclick="togglePlay()">▶</button>
            <button class="ctrl-btn" onclick="nextTrack()">⏭</button>
        </div>
    </div>

    <script>
        let allTracks = [];
        let currentTab = 'all';
        let isDark = true;
        let audio = null;
        let currentTrack = null;
        let currentIndex = -1;
        let playlist = [];
        let likedSongs = new Set();
        let progressInterval = null;

        const tg = window.Telegram.WebApp;
        tg.expand();

        // === ТЕМА ===
        function toggleTheme() {
            isDark = !isDark;
            document.body.classList.toggle('light-theme', !isDark);
            document.querySelector('.theme-btn').textContent = isDark ? '🌙' : '☀️';
            localStorage.setItem('bf_theme', isDark ? 'dark' : 'light');
        }

        const savedTheme = localStorage.getItem('bf_theme');
        if (savedTheme === 'light') { isDark = false; document.body.classList.add('light-theme'); document.querySelector('.theme-btn').textContent = '☀️'; }

        // === ЗАГРУЗКА ===
        fetch('https://dmitry3322.github.io/media-player/music_list.json')
            .then(r => r.ok ? r.json() : Promise.reject('Ошибка'))
            .then(data => {
                allTracks = data || [];
                playlist = [...allTracks];
                renderTracks();
            })
            .catch(() => {
                document.getElementById('trackList').innerHTML = '<div class="empty">Файл music_list.json не найден</div>';
            });

        // === ВКЛАДКИ ===
        function switchTab(tab) {
            currentTab = tab;
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            const tabs = document.querySelectorAll('.tab');
            if (tab === 'all') tabs[0].classList.add('active');
            else if (tab === 'audio') tabs[1].classList.add('active');
            else tabs[2].classList.add('active');
            renderTracks();
        }

        function filterTracks() {
            renderTracks(document.querySelector('.search-box').value.toLowerCase());
        }

        // === ОТРИСОВКА ===
        function renderTracks(query = '') {
            let filtered = [...allTracks];
            if (currentTab === 'audio') filtered = filtered.filter(t => t.file_type === 'audio');
            if (currentTab === 'video') filtered = filtered.filter(t => t.file_type === 'video');
            if (query) filtered = filtered.filter(t => (t.artist + " " + t.title).toLowerCase().includes(query));

            const container = document.getElementById('trackList');
            container.innerHTML = filtered.length ? '' : '<div class="empty">Ничего не найдено</div>';

            filtered.forEach((t, idx) => {
                const div = document.createElement('div');
                div.className = 'track-item';
                div.innerHTML = `
                    <div class="track-icon">${t.file_type === 'audio' ? '🎧' : '🎬'}</div>
                    <div class="track-info">
                        <div class="track-title">${t.title || 'Без названия'}</div>
                        <div class="track-artist">${t.artist || 'Неизвестен'}</div>
                    </div>
                    <button class="btn btn-play" data-id="${t.id}" data-idx="${idx}" data-action="play">▶</button>
                    <button class="btn btn-heart ${likedSongs.has(t.id) ? 'liked' : ''}" data-id="${t.id}" data-action="like">❤️</button>
                `;
                container.appendChild(div);
            });

            document.querySelectorAll('.btn-play').forEach(b => b.addEventListener('click', onPlayClick));
            document.querySelectorAll('.btn-heart').forEach(b => b.addEventListener('click', onLikeClick));
        }

        // === ЛАЙК ===
        function onLikeClick(e) {
            const btn = e.target.closest('.btn-heart');
            const id = parseInt(btn.dataset.id);
            if (likedSongs.has(id)) {
                likedSongs.delete(id);
                btn.classList.remove('liked');
            } else {
                likedSongs.add(id);
                btn.classList.add('liked');
            }
            localStorage.setItem('bf_liked', JSON.stringify([...likedSongs]));
        }

        const savedLikes = localStorage.getItem('bf_liked');
        if (savedLikes) { try { likedSongs = new Set(JSON.parse(savedLikes)); } catch(e) {} }

        // === ПЛЕЕР ===
        function onPlayClick(e) {
            const btn = e.target.closest('.btn-play');
            const idx = parseInt(btn.dataset.idx);
            const track = allTracks[idx];
            if (!track || track.file_type !== 'audio') {
                tg.sendData(JSON.stringify({action: 'play', id: track?.id || parseInt(btn.dataset.id)}));
                tg.close();
                return;
            }
            currentIndex = idx;
            currentTrack = track;
            showPlayer(track);
        }

        function showPlayer(track) {
            document.getElementById('player').classList.add('show');
            document.getElementById('playerTitle').textContent = `${track.artist || '?'} — ${track.title || '?'}`;
            document.getElementById('playBtn').textContent = '▶';
            document.getElementById('progressFill').style.width = '0%';
            document.getElementById('curTime').textContent = '0:00';
            document.getElementById('durTime').textContent = '0:00';
            if (audio) { audio.pause(); audio = null; }
            if (progressInterval) clearInterval(progressInterval);
            sendToBot('play', track.id);
        }

        function closePlayer() {
            document.getElementById('player').classList.remove('show');
            if (audio) { audio.pause(); audio = null; }
            if (progressInterval) clearInterval(progressInterval);
            currentTrack = null;
        }

        function togglePlay() {
            if (!audio) return;
            if (audio.paused) { audio.play(); document.getElementById('playBtn').textContent = '⏸'; }
            else { audio.pause(); document.getElementById('playBtn').textContent = '▶'; }
        }

        function prevTrack() {
            if (currentIndex <= 0) return;
            const audioTracks = allTracks.filter(t => t.file_type === 'audio');
            const prev = audioTracks.findIndex(t => t.id === currentTrack.id);
            if (prev > 0) {
                currentTrack = audioTracks[prev - 1];
                currentIndex = allTracks.indexOf(currentTrack);
                showPlayer(currentTrack);
            }
        }

        function nextTrack() {
            const audioTracks = allTracks.filter(t => t.file_type === 'audio');
            const next = audioTracks.findIndex(t => t.id === currentTrack.id);
            if (next < audioTracks.length - 1) {
                currentTrack = audioTracks[next + 1];
                currentIndex = allTracks.indexOf(currentTrack);
                showPlayer(currentTrack);
            }
        }

        function seekAudio(e) {
            if (!audio) return;
            const bar = document.querySelector('.progress-bar');
            const rect = bar.getBoundingClientRect();
            const pct = (e.clientX - rect.left) / rect.width;
            audio.currentTime = pct * audio.duration;
        }

        function sendToBot(action, id) {
            tg.sendData(JSON.stringify({action: action, id: id}));
        }
    </script>
</body>
</html>
