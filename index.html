<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BOT FRIEND Media</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        /* Переменные тем оформления */
        :root {
            --bg: #1e1e24;
            --card: #282830;
            --text: #e0e0e0;
            --sub: #999;
            --accent: #7c6ff7;
            --active: #6a5de0;
            --border: #333;
            --batch-bg: #22222a;
        }

        body.light-theme {
            --bg: #f4f4f7;
            --card: #ffffff;
            --text: #1c1c1f;
            --sub: #6e6e77;
            --border: #e4e4e7;
            --batch-bg: #e4e4e7;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg); color: var(--text);
            height: 100vh; display: flex; flex-direction: column;
            user-select: none; -webkit-tap-highlight-color: transparent;
            padding-bottom: 0; transition: background 0.2s;
        }
        
        /* Двухстрочная гибкая шапка */
        .header { padding: 16px; background: #222; border-bottom: 1px solid var(--border); display: flex; flex-direction: column; gap: 10px; }
        body.light-theme .header { background: #e4e4e7; }
        
        .header-top { display: flex; justify-content: space-between; align-items: center; }
        .header-title-block { display: flex; align-items: center; gap: 8px; }
        .header h1 { font-size: 20px; font-weight: 600; color: #fff; }
        body.light-theme .header h1 { color: #1c1c1f; }
        
        /* Индикатор пинга ядра */
        .ping-indicator { width: 8px; height: 8px; background-color: #ff3b30; border-radius: 50%; display: inline-block; transition: background-color 0.3s; }
        .ping-indicator.online { background-color: #4cd964; }

        /* Блок кнопок в правом верхнем углу */
        .header-actions { display: flex; align-items: center; gap: 8px; }
        .action-icon-btn {
            background: #2a2a2a; border: 1px solid var(--border); color: #fff;
            cursor: pointer; width: 32px; height: 32px; border-radius: 8px;
            display: flex; align-items: center; justify-content: center; font-size: 14px;
        }
        body.light-theme .action-icon-btn { background: #ffffff; color: #1c1c1f; border-color: #ccc; }
        .action-icon-btn:active { opacity: 0.7; }

        .search-box {
            width: 100%; padding: 12px 14px; border-radius: 12px;
            border: 1px solid var(--border); background: #2a2a2a;
            color: var(--text); font-size: 15px; outline: none;
        }
        body.light-theme .search-box { background: #ffffff; color: #1c1c1f; }
        
        .tabs { display: flex; gap: 6px; padding: 10px 16px; background: #222; border-bottom: 1px solid var(--border); }
        body.light-theme .tabs { background: #e4e4e7; }
        .tab {
            flex: 1; padding: 12px 6px; border-radius: 10px; border: none;
            background: #2a2a2a; color: var(--sub); font-size: 12px;
            font-weight: 500; cursor: pointer; text-align: center;
        }
        body.light-theme .tab { background: #ffffff; }
        .tab.active { background: var(--accent); color: #fff; }
        
        .track-list { flex: 1; overflow-y: auto; padding: 8px 16px; }
        
        /* Измененная карточка: закругление 15px и окантовка акцентом */
        .track-item {
            display: flex; align-items: center; padding: 14px 12px;
            border-radius: 15px; background: var(--card); margin-bottom: 8px; gap: 12px;
            border: 1px solid var(--accent); position: relative;
        }
        
        /* Чекбоксы мульти-выбора */
        .track-checkbox { width: 18px; height: 18px; accent-color: var(--accent); cursor: pointer; }
        .track-icon { font-size: 24px; }
        .track-info { flex: 1; min-width: 0; }
        .track-title { font-size: 15px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .track-artist { font-size: 13px; color: var(--sub); overflow: hidden; text-overflow: ellipsis; }
        
        .track-controls { display: flex; align-items: center; gap: 14px; }
        
        /* Сердечко */
        .heart-icon { font-size: 18px; cursor: pointer; color: var(--sub); user-select: none; transition: color 0.2s; }
        .heart-icon.active { color: #ff3b30; }
        
        .btn { padding: 10px 14px; border-radius: 10px; border: none; cursor: pointer; }
        .btn-play { background: var(--accent); color: #fff; }
        .empty { text-align: center; padding: 40px; color: var(--sub); }

        /* Скрытая выплывающая нижняя панель для мульти-выбора */
        .batch-panel {
            position: fixed; bottom: 0; left: 0; right: 0;
            background: var(--batch-bg); border-top: 1px solid var(--border);
            padding: 14px 16px; display: none; justify-content: center; z-index: 1000;
            box-shadow: 0 -4px 10px rgba(0,0,0,0.3);
        }
        .btn-batch { width: 100%; max-width: 450px; padding: 14px; border-radius: 12px; border: none; font-weight: 600; background: #4cd964; color: #fff; font-size: 14px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="header">
        <div class="header-top">
            <div class="header-title-block">
                <span class="ping-indicator" id="pingDot"></span>
                <h1>🎬 BOT FRIEND</h1>
            </div>
            <div class="header-actions">
                <button class="action-icon-btn" onclick="toggleTheme()" id="themeBtn">🌙</button>
                <button class="action-icon-btn" onclick="location.reload()">↻</button>
            </div>
        </div>
        <input type="text" class="search-box" placeholder="🔍 Поиск..." oninput="filterTracks()">
    </div>
    <div class="tabs">
        <button class="tab active" onclick="switchTab('all')">Все</button>
        <button class="tab" onclick="switchTab('audio')">🎧 Аудио</button>
        <button class="tab" onclick="switchTab('video')">🎬 Клипы</button>
    </div>
    <div class="track-list" id="trackList"><div class="empty">Загрузка...</div></div>
    
    <div class="batch-panel" id="batchPanel">
        <button class="btn-batch" onclick="sendSelectedBatch()" id="batchBtn">Прослушать выбранное (0)</button>
    </div>

    <script>
        let allTracks = [];
        let currentTab = 'all';
        const tg = window.Telegram.WebApp;
        tg.expand();

        // Симуляция пинга ядра Python (изменение статуса точки)
        setTimeout(() => { document.getElementById('pingDot').classList.add('online'); }, 600);

        // Переключение тем оформления
        function toggleTheme() {
            document.body.classList.toggle('light-theme');
            const btn = document.getElementById('themeBtn');
            btn.innerText = document.body.classList.contains('light-theme') ? '☀️' : '🌙';
        }

        // Загрузка данных из твоего репозитория
        fetch('https://dmitry3322.github.io/media-player/music_list.json')
            .then(r => {
                if (!r.ok) throw new Error('Ошибка загрузки файла');
                return r.json();
            })
            .then(data => {
                allTracks = data || [];
                renderTracks();
            })
            .catch((err) => {
                console.error(err);
                document.getElementById('trackList').innerHTML = '<div class="empty">Файл music_list.json не найден или пуст</div>';
            });

        function switchTab(tab) {
            currentTab = tab;
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            const tabs = document.querySelectorAll('.tab');
            if (tab === 'all') tabs[0].classList.add('active');
            else if (tab === 'audio') tabs[1].classList.add('active');
            else if (tab === 'video') tabs[2].classList.add('active');
            renderTracks();
            handleCheckboxChange();
        }

        function filterTracks() {
            const query = document.querySelector('.search-box').value.toLowerCase();
            renderTracks(query);
            handleCheckboxChange();
        }

        // Рендеринг карточек с поддержкой чекбоксов и сердечек
        function renderTracks(query = '') {
            let filtered = allTracks;
            
            if (currentTab === 'audio') filtered = filtered.filter(t => t.file_type === 'audio');
            if (currentTab === 'video') filtered = filtered.filter(t => t.file_type === 'video');
            
            if (query) {
                filtered = filtered.filter(t => 
                    (t.artist + " " + t.title).toLowerCase().includes(query)
                );
            }

            const container = document.getElementById('trackList');
            container.innerHTML = filtered.length ? '' : '<div class="empty">Ничего не найдено</div>';
            
            filtered.forEach(t => {
                const div = document.createElement('div');
                div.className = 'track-item';
                div.setAttribute('data-id', t.id);
                div.innerHTML = `
                    <input type="checkbox" class="track-checkbox" onchange="handleCheckboxChange()">
                    <div class="track-icon">${t.file_type === 'audio' ? '🎧' : '🎬'}</div>
                    <div class="track-info">
                        <div class="track-title">${t.title || 'Без названия'}</div>
                        <div class="track-artist">${t.artist || 'Неизвестен'}</div>
                    </div>
                    <div class="track-controls">
                        <span class="heart-icon" onclick="this.classList.toggle('active')">♥</span>
                        <button class="btn btn-play" onclick="sendToBot('play', ${t.id})">▶</button>
                    </div>
                `;
                container.appendChild(div);
            });
        }

        // Логика расчета мульти-выбора
        function handleCheckboxChange() {
            const checkboxes = document.querySelectorAll('.track-checkbox');
            const panel = document.getElementById('batchPanel');
            const btn = document.getElementById('batchBtn');
            
            let selectedCount = 0;
            checkboxes.forEach(cb => { if (cb.checked) selectedCount++; });

            if (selectedCount > 0) {
                panel.style.display = 'flex';
                btn.innerText = `Прослушать выбранное (${selectedCount})`;
            } else {
                panel.style.display = 'none';
            }
        }

        function sendToBot(action, id) {
            tg.sendData(JSON.stringify({action: action, id: id}));
            tg.close();
        }

        // Пакетная отправка выбранного массива ID
        function sendSelectedBatch() {
            const checkboxes = document.querySelectorAll('.track-checkbox');
            let selectedIds = [];
            
            checkboxes.forEach(cb => {
                if (cb.checked) {
                    const item = cb.closest('.track-item');
                    selectedIds.push(parseInt(item.getAttribute('data-id')));
                }
            });

            if (selectedIds.length > 0) {
                tg.sendData(JSON.stringify({action: "play_batch", ids: selectedIds}));
                tg.close();
            }
        }
    </script>
</body>
</html>
