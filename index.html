<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BOT FRIEND Media</title>
    <style>
        :root {
            --bg: #1a1a1a;
            --card: #252525;
            --text: #e0e0e0;
            --sub: #999;
            --accent: #4a90d9;
            --active: #3a7bc8;
            --danger: #d94a4a;
            --border: #333;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
            height: 100vh;
            display: flex;
            flex-direction: column;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        /* Шапка */
        .header {
            padding: 16px;
            background: #1e1e1e;
            border-bottom: 1px solid var(--border);
            position: sticky;
            top: 0;
            z-index: 10;
        }

        .header h1 {
            font-size: 20px;
            font-weight: 600;
            margin-bottom: 10px;
        }

        .search-box {
            width: 100%;
            padding: 10px 14px;
            border-radius: 12px;
            border: 1px solid var(--border);
            background: #2a2a2a;
            color: var(--text);
            font-size: 15px;
            outline: none;
            transition: border 0.2s;
        }

        .search-box:focus {
            border-color: var(--accent);
        }

        /* Вкладки */
        .tabs {
            display: flex;
            gap: 4px;
            padding: 8px 16px;
            background: #1e1e1e;
            border-bottom: 1px solid var(--border);
            position: sticky;
            top: 105px;
            z-index: 10;
        }

        .tab {
            flex: 1;
            padding: 10px 8px;
            border-radius: 10px;
            border: none;
            background: transparent;
            color: var(--sub);
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            text-align: center;
        }

        .tab.active {
            background: var(--accent);
            color: #fff;
        }

        /* Список */
        .track-list {
            flex: 1;
            overflow-y: auto;
            padding: 8px 16px;
            -webkit-overflow-scrolling: touch;
        }

        .track-item {
            display: flex;
            align-items: center;
            padding: 12px;
            border-radius: 12px;
            background: var(--card);
            margin-bottom: 6px;
            cursor: pointer;
            transition: background 0.15s;
            gap: 10px;
        }

        .track-item:active {
            background: #303030;
        }

        .track-icon {
            font-size: 20px;
            min-width: 24px;
            text-align: center;
        }

        .track-info {
            flex: 1;
            min-width: 0;
        }

        .track-title {
            font-size: 14px;
            font-weight: 500;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .track-artist {
            font-size: 12px;
            color: var(--sub);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .track-actions {
            display: flex;
            gap: 6px;
        }

        .btn {
            padding: 8px 12px;
            border-radius: 8px;
            border: none;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.15s;
        }

        .btn-play {
            background: var(--accent);
            color: #fff;
        }

        .btn-play:active {
            background: var(--active);
        }

        .btn-fav {
            background: #333;
            color: #ffb800;
        }

        .btn-fav:active {
            background: #444;
        }

        /* Нижняя панель */
        .bottom-bar {
            padding: 12px 16px;
            background: #1e1e1e;
            border-top: 1px solid var(--border);
            display: flex;
            gap: 8px;
            position: sticky;
            bottom: 0;
        }

        .btn-bottom {
            flex: 1;
            padding: 12px;
            border-radius: 10px;
            border: none;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.15s;
        }

        .btn-sync {
            background: #333;
            color: var(--text);
        }

        .btn-sync:active {
            background: #444;
        }

        .btn-play-all {
            background: var(--accent);
            color: #fff;
        }

        .btn-play-all:active {
            background: var(--active);
        }

        .counter {
            font-size: 11px;
            color: var(--sub);
            text-align: center;
            padding: 4px;
        }

        .empty {
            text-align: center;
            padding: 40px 20px;
            color: var(--sub);
            font-size: 14px;
        }
    </style>
</head>
<body>

    <!-- Шапка -->
    <div class="header">
        <h1>🎬 BOT FRIEND</h1>
        <input type="text" class="search-box" placeholder="🔍 Поиск..." oninput="filterTracks()">
    </div>

    <!-- Вкладки -->
    <div class="tabs">
        <button class="tab active" onclick="switchTab('all')">Все</button>
        <button class="tab" onclick="switchTab('audio')">🎧 Аудио</button>
        <button class="tab" onclick="switchTab('video')">🎬 Клипы</button>
        <button class="tab" onclick="switchTab('fav')">⭐ Избранное</button>
    </div>

    <!-- Список треков -->
    <div class="track-list" id="trackList">
        <div class="empty">Загрузка...</div>
    </div>

    <!-- Счётчик -->
    <div class="counter" id="counter"></div>

    <!-- Нижняя панель -->
    <div class="bottom-bar">
        <button class="btn-bottom btn-sync" onclick="syncTracks()">🔄 Обновить</button>
        <button class="btn-bottom btn-play-all" onclick="playAllFav()">▶ Избранное</button>
    </div>

    <script>
        // Данные треков
        let allTracks = [];
        let currentTab = 'all';
        let searchQuery = '';

        // При загрузке страницы
        window.addEventListener('DOMContentLoaded', () => {
            // Пробуем получить данные из URL
            const params = new URLSearchParams(window.location.search);
            const data = params.get('data');
            
            if (data) {
                try {
                    allTracks = JSON.parse(decodeURIComponent(data));
                    renderTracks();
                } catch(e) {
                    document.getElementById('trackList').innerHTML = '<div class="empty">Ошибка загрузки данных</div>';
                }
            } else {
                document.getElementById('trackList').innerHTML = '<div class="empty">Нажмите 🔄 Обновить для загрузки</div>';
            }
        });

        // Переключение вкладок
        function switchTab(tab) {
            currentTab = tab;
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelector(`.tab:nth-child(${
                tab === 'all' ? 1 : tab === 'audio' ? 2 : tab === 'video' ? 3 : 4
            })`).classList.add('active');
            renderTracks();
        }

        // Фильтрация треков
        function filterTracks() {
            searchQuery = document.querySelector('.search-box').value.toLowerCase();
            renderTracks();
        }

        // Отображение треков
        function renderTracks() {
            let tracks = [...allTracks];
            
            // Фильтр по вкладке
            if (currentTab === 'audio') tracks = tracks.filter(t => t.type === 'audio');
            if (currentTab === 'video') tracks = tracks.filter(t => t.type === 'video');
            if (currentTab === 'fav') tracks = tracks.filter(t => t.fav);
            
            // Фильтр по поиску
            if (searchQuery) {
                tracks = tracks.filter(t => 
                    (t.artist + ' ' + t.title).toLowerCase().includes(searchQuery)
                );
            }
            
            const container = document.getElementById('trackList');
            const counter = document.getElementById('counter');
            
            if (tracks.length === 0) {
                container.innerHTML = '<div class="empty">Ничего не найдено</div>';
                counter.textContent = '';
                return;
            }
            
            counter.textContent = `Показано: ${tracks.length}`;
            
            container.innerHTML = tracks.map((t, i) => `
                <div class="track-item">
                    <div class="track-icon">${t.type === 'audio' ? '🎧' : '🎬'}</div>
                    <div class="track-info">
                        <div class="track-title">${escapeHtml(t.title)}</div>
                        <div class="track-artist">${escapeHtml(t.artist)}</div>
                    </div>
                    <div class="track-actions">
                        <button class="btn btn-play" onclick="playTrack('${t.id}', '${t.type}')">▶</button>
                        <button class="btn btn-fav" onclick="toggleFav('${t.id}')">${t.fav ? '★' : '☆'}</button>
                    </div>
                </div>
            `).join('');
        }

        // Отправить команду боту
        function sendToBot(action, id) {
            if (window.Telegram && window.Telegram.WebApp) {
                window.Telegram.WebApp.sendData(JSON.stringify({action, id}));
            }
        }

        // Воспроизвести трек
        function playTrack(id, type) {
            sendToBot('play', id);
        }

        // Избранное
        function toggleFav(id) {
            sendToBot('fav', id);
            // Локально переключаем
            const track = allTracks.find(t => t.id == id);
            if (track) track.fav = !track.fav;
            renderTracks();
        }

        // Синхронизация с ботом
        function syncTracks() {
            sendToBot('sync', null);
        }

        // Воспроизвести всё избранное
        function playAllFav() {
            sendToBot('play_all_fav', null);
        }

        // Экранирование HTML
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
    </script>
</body>
</html>
