<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"><title>Test</title></head>
<body>
    <h1>Тест WebApp</h1>
    <script>
        if (window.Telegram && window.Telegram.WebApp) {
            window.Telegram.WebApp.ready();
            window.Telegram.WebApp.sendData(JSON.stringify({action: 'test'}));
            document.body.innerHTML += '<p style="color:green;">✅ sendData отправлен</p>';
        } else {
            document.body.innerHTML += '<p style="color:red;">⛔ Не WebApp</p>';
        }
    </script>
</body>
</html>
